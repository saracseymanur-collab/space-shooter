  ctx.stroke();
  ctx.fillStyle = 'rgba(0,255,200,0.95)';
  ctx.font = 'bold 15px Courier New';
  ctx.shadowBlur = 6;
  ctx.fillText('BACK TO MAP', W / 2, btnY + 1);
  ctx.restore();
}

// --- Bomb: patlat hepsini ---
function activateBomb() {
  enemies.forEach(e => {
    spawnExplosion(e.x, e.y, true);
    score += e.maxHp * 10;
  });
  // Büyük ekran flaşı
  explosions.push({ x: W / 2, y: H / 2, vx: 0, vy: 0, life: 1, decay: 0.04, r: 260, color: 'rgba(255,80,80,0.18)', isBombFlash: true });
  enemies = [];
}

// --- Update ---
function update() {
  frameCount++;

  stars.forEach(s => {
    s.y += s.spd;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });

  // Zone transition update
  if (state === 'zonetransition') {
    if (zoneTransPhase === 'fadein') {
      zoneTransAlpha = Math.min(1, zoneTransAlpha + 0.022);
      if (zoneTransAlpha >= 1) zoneTransPhase = 'show';
    }
    return;
  }

  // Intro cinematic update
  if (state === 'intro') {
    if (introPhase === 'fadein') {
      introAlpha = Math.min(1, introAlpha + 0.033);
      if (introAlpha >= 1) introPhase = 'show';
    } else if (introPhase === 'fadeout') {
      introAlpha = Math.max(0, introAlpha - 0.05);
      if (introAlpha <= 0) {
        introPanelIdx++;
        if (introPanelIdx >= INTRO_PANELS.length) {
          introPanelIdx = 0; introAlpha = 0; introPhase = 'fadein';
          state = 'menu';
        } else {
          introPhase = 'fadein';
        }
      }
    }
    return;
  }

  // Menu kart animasyonu
  menuAnimX += (menuIdx * (W - 60) - menuAnimX) * 0.14;

  if (state === 'levelcomplete') {
    if (levelCompleteType === 'clear') {
      if (bossKillTimer > 0) { bossKillTimer--; if (bossKillTimer === 0) { state = 'map'; } }
    } else {
      // Boss zaferi: zamanı say, parçacıkları oluştur ve güncelle
      victoryTime++;
      const spawnCount = victoryTime < 90 ? 5 : victoryTime < 200 ? 2 : (victoryTime % 20 < 3 ? 2 : 0);
      const VCOLORS = ['#ffe040','#00ffff','#ff44ff','#44ff88','#ff8800','#ffffff','#88aaff','#ffaaff'];
      for (let i = 0; i < spawnCount; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 2.5 + Math.random() * 7;
        victoryParticles.push({
          x: W * 0.2 + Math.random() * W * 0.6,
          y: H * 0.25 + Math.random() * H * 0.45,
          vx: Math.cos(a) * spd,
          vy: Math.sin(a) * spd - 3.5,
          life: 1,
          decay: 0.006 + Math.random() * 0.014,
          r: 2.5 + Math.random() * 6,
          color: VCOLORS[Math.floor(Math.random() * VCOLORS.length)],
          star: Math.random() < 0.35,
        });
      }
      victoryParticles = victoryParticles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.14;
        p.vx *= 0.985;
        p.life -= p.decay;
        return p.life > 0;
      });
    }
    return;
  }
  if (state !== 'play') return;

  // Player slide (ice slow: reduced responsiveness)
  const targetX = LANE_CENTERS[player.targetLane];
  const slideFactor = (currentZone === 2 && iceSlowTimer > 0) ? 0.10 : 0.35;
  player.x += (targetX - player.x) * slideFactor;
  if (Math.abs(targetX - player.x) < 1) player.x = targetX;

  if (player.flash > 0) player.flash--;
  if (player.shieldTimer > 0) player.shieldTimer--;
  if (player.doubleTimer > 0) player.doubleTimer--;
  if (player.tripleTimer > 0) player.tripleTimer--;

  // Death animation
  if (player.dead) {
    player.deathTimer++;
    if (player.deathTimer > 80) state = 'gameover';
    return;
  }

  // Auto fire
  player.fireTimer++;
  if (player.fireTimer >= player.fireRate) {
    player.fireTimer = 0;
    const bColor = player.tripleTimer > 0 ? 'triple' : player.doubleTimer > 0 ? 'double' : 'normal';
    if (player.tripleTimer > 0) {
      bullets.push({ x: player.x - 13, y: player.y - 20, speed: 10, color: bColor });
      bullets.push({ x: player.x,      y: player.y - 28, speed: 10, color: bColor });
      bullets.push({ x: player.x + 13, y: player.y - 20, speed: 10, color: bColor });
    } else if (player.doubleTimer > 0) {
      bullets.push({ x: player.x - 10, y: player.y - 24, speed: 10, color: bColor });
      bullets.push({ x: player.x + 10, y: player.y - 24, speed: 10, color: bColor });
    } else {
      bullets.push({ x: player.x, y: player.y - 28, speed: 10, color: bColor });
    }
  }

  // Bullets move
  bullets = bullets.filter(b => { b.y -= b.speed; return b.y > -10; });

  // Boss spawn tespiti: sadece 5. bölümde
  const currentWave = getWave();
  if (currentWave !== lastWaveForBoss) {
    lastWaveForBoss = currentWave;
    if (currentLevel === currentZone * 5 && currentWave % 5 === 0 && !boss) spawnBoss(currentWave);
  }

  // Level tamamlama: 5 dalgayı geçince bölüm biter (boss seviyesi hariç)
  const _zoneLastLevel = currentZone * 5;
  if (currentLevel !== _zoneLastLevel && !boss && currentWave > currentLevel * 5 && enemies.length === 0) {
    levelStates[currentLevel - 1] = 'completed';
    levelStates[currentLevel] = 'unlocked';
    saveLevelStates();
    bossKillTimer = 180;
    levelCompleteType = 'clear';
    state = 'levelcomplete';
  }

  // Boss güncelleme
  if (boss) {
    const ratio = boss.hp / boss.maxHp;
    const prevPhase = boss.phase || 1;
    boss.phase = ratio > 0.6 ? 1 : ratio > 0.3 ? 2 : 3;
    if (boss.phase !== prevPhase) { boss.flash = 20; boss.fireTimer = 0; } // faz geçişinde flash

    // Yatay hareket hızı faza göre
    const baseSpeed = (boss.special ? 1.9 : 1.2 + boss.bossNum * 0.2)
                    * (boss.phase === 1 ? 1.0 : boss.phase === 2 ? 1.7 : 2.8);
    const sign = boss.vx >= 0 ? 1 : -1;
    boss.vx = sign * baseSpeed;
    boss.x += boss.vx;
    if (boss.x < 55) { boss.x = 55; boss.vx = baseSpeed; }
    if (boss.x > W - 55) { boss.x = W - 55; boss.vx = -baseSpeed; }

    // Dikey: her fazda üstte sabit
    const homeY = boss.special ? H * 0.14 : H * 0.13;
    boss.y += (homeY - boss.y) * 0.025;

    if (boss.flash > 0) boss.flash--;

    // Boss ateş ediyor
    boss.fireTimer++;
    if (boss.fireTimer >= boss.nextFireIn) {
      boss.fireTimer = 0;
      const bY  = boss.y + 44;
      const mk  = (x, vy, big) => ({ x, y: bY, vx: 0, vy, hp: 3, lane: -1, fromBoss: true, big: !!big });

      if (boss.zone === 2) {
        // Zone 2 boss: fires asteroids + bullets by phase
        const phase = boss.phase || 1;
        if (phase === 1) {
          boss.nextFireIn = 55 + Math.random() * 20;
          spawnAsteroid('normal', boss.x + (Math.random()-0.5)*80, boss.y + 50, 18 + Math.random()*10);
          asteroids[asteroids.length-1].speed = 3.5; asteroids[asteroids.length-1].vx = 0;
        } else if (phase === 2) {
          boss.nextFireIn = 40 + Math.random() * 15;
          const atype = Math.random() < 0.45 ? 'iron' : 'normal';
          spawnAsteroid(atype, boss.x + (Math.random()-0.5)*100, boss.y + 50, 20 + Math.random()*12);
          asteroids[asteroids.length-1].speed = 4.0; asteroids[asteroids.length-1].vx = 0;
          eBullets.push(mk(LANE_CENTERS[Math.floor(Math.random()*3)], 5.0));
        } else {
          boss.nextFireIn = 22 + Math.random() * 10;
          spawnAsteroid('ice', boss.x + (Math.random()-0.5)*60, boss.y + 50, 16 + Math.random()*8);
          asteroids[asteroids.length-1].speed = 4.5; asteroids[asteroids.length-1].vx = 0;
          eBullets.push(mk(LANE_CENTERS[Math.floor(Math.random()*3)], 6.0));
          if (Math.random() < 0.4) eBullets.push(mk(LANE_CENTERS[Math.floor(Math.random()*3)], 5.5));
        }
      } else if (boss.phase === 1) {
        // ── FAZ 1: tek mermi, yavaş ──
        // Rastgele 1 şerite ateş → 2 şerit daima boş
        boss.nextFireIn = 62 + Math.random() * 18;
        eBullets.push(mk(LANE_CENTERS[Math.floor(Math.random() * 3)], 4.5));

      } else if (boss.phase === 2) {
        // ── FAZ 2: 2 şerite ateş, 1 şerit daima boş ──
        // Safe lane her atışta değişir → oyuncu takip etmek zorunda
        boss.nextFireIn = 36 + Math.random() * 14;
        const safe = Math.floor(Math.random() * 3);
        [0, 1, 2].filter(l => l !== safe).forEach(l =>
          eBullets.push(mk(LANE_CENTERS[l], 5.5))
        );

      } else {
        // ── FAZ 3: dalga sistemi ──
        // Ekran 4 eşit zona bölünür. Her dalgada 1 zon güvenli, 3 zona ateş.
        // Dalga biter → nefes molası → oyuncu güvenli zona geçer → yeni dalga
        const ZONE_CENTERS = [W/8, 3*W/8, 5*W/8, 7*W/8]; // 4 eşit zon, W orantılı

        if (!boss.wave) boss.wave = { onBreak: true, fired: 0, size: 3, targets: [], safeZone: 0 };
        const w = boss.wave;

        if (w.onBreak) {
          // Nefes molası bitti → yeni dalgayı hazırla
          w.onBreak  = false;
          w.fired    = 0;
          w.size     = 3 + (Math.random() < 0.38 ? 1 : 0); // 3 veya 4 mermi
          w.safeZone = Math.floor(Math.random() * 4);       // rastgele güvenli zon
          w.targets  = ZONE_CENTERS.filter((_, i) => i !== w.safeZone);
          boss.nextFireIn = 10; // ilk mermi kısa gecikmeli
        } else {
          // Dalga içi bir mermi at (hedef zonlar sırayla)
          const x = w.targets[w.fired % w.targets.length];
          if (w.fired === 0 && Math.random() < 0.22) {
            // Dalga başı: küçük şansla büyük yavaş mermi — tek şerit hedef
            eBullets.push(mk(LANE_CENTERS[Math.floor(Math.random() * 3)], 3.0, true));
          } else {
            eBullets.push(mk(x, 6.5));
          }
          w.fired++;

          if (w.fired >= w.size) {
            // Dalga bitti → nefes molası (~1 sn)
            w.onBreak       = true;
            boss.nextFireIn = 58 + Math.random() * 22;
          } else {
            // Dalga devam → hızlı ardışık ateş
            boss.nextFireIn = 11 + Math.random() * 7;
          }
        }
      }
    }

    // Oyuncu mermileri bossa çarpıyor
    bullets = bullets.filter(b => {
      if (!boss) return true; // boss aynı frame'de öldüyse kalan mermilere dokunma
      const bsc = boss.special ? 1.45 : 1.0;
      const hit = Math.abs(b.x - boss.x) < 62 * bsc && Math.abs(b.y - boss.y) < 48 * bsc;
      if (hit) {
        boss.hp--;
        boss.flash = 8;
        spawnExplosion(b.x, b.y, false);
        if (boss.hp <= 0) {
          for (let i = 0; i < 8; i++)
            spawnExplosion(boss.x + (Math.random() - 0.5) * 130, boss.y + (Math.random() - 0.5) * 80, true);
          score += 300 + boss.bossNum * 200;
          levelStates[currentLevel - 1] = 'completed';
          const _zll = currentZone * 5;
          if (currentLevel < _zll) {
            levelStates[currentLevel] = 'unlocked';
          } else if (currentLevel < levelStates.length) {
            levelStates[currentLevel] = 'unlocked'; // first level of next zone
            if (currentZone < MENU_CARDS.length) {
              MENU_CARDS[currentZone].locked = false;
              saveZoneStates();
            }
          }
          saveLevelStates();
          boss = null;
          bossKillTimer = 180;
          levelCompleteType = 'boss';
          returnToMap = true;
          victoryTime = 0;
          victoryParticles = [];
          state = 'levelcomplete';
        }
      }
      return !hit;
    });
  }

  // --- Zone 2 mechanics ---
  if (currentZone === 2 && state === 'play' && !player.dead) {
    // Fuel drain
    fuel = Math.max(0, fuel - FUEL_DRAIN);
    if (fuel <= 0) {
      lives = 0;
      player.dead = true;
      spawnExplosion(player.x, player.y, true);
      spawnExplosion(player.x + 15, player.y - 10, true);
    }

    // Ice slow countdown
    if (iceSlowTimer > 0) iceSlowTimer--;

    // Magnetic field (level 9)
    if (currentLevel === 9 && !boss) {
      magnetSwitchTimer--;
      if (magnetSwitchTimer <= 0) { magnetDir *= -1; magnetSwitchTimer = 240 + Math.floor(Math.random() * 180); }
      const force = 0.55 * magnetDir;
      player.x += force;
      // Also nudge targetLane center slightly
      const targetX = LANE_CENTERS[player.targetLane];
      player.x = player.x * 0.95 + (targetX + force * 8) * 0.05;
      player.x = Math.max(16, Math.min(W - 16, player.x));
    }

    // Asteroid spawning
    if (!boss) {
      asteroidSpawnTimer++;
      const astLvl = currentLevel - 5; // 1-4 for zone 2 levels 6-9
      const astInterval = [96, 80, 82, 74][astLvl - 1] ?? 80;
      if (asteroidSpawnTimer >= astInterval) {
        asteroidSpawnTimer = 0;
        // Max 1 iron asteroid on screen at any time
        const hasIron = asteroids.some(a => a.type === 'iron');
        const capIron = t => (t === 'iron' && hasIron) ? 'normal' : t;

        let atype;
        if (astLvl === 1) atype = 'normal';
        else if (astLvl === 2) atype = capIron(Math.random() < 0.40 ? 'iron' : 'normal');
        else if (astLvl === 3) atype = capIron(Math.random() < 0.28 ? 'ice' : Math.random() < 0.38 ? 'iron' : 'normal');
        else atype = capIron(['normal','iron','ice'][Math.floor(Math.random() * 3)]);
        spawnAsteroid(atype);
        // Second asteroid only when no iron on screen and only normal/ice types
        if (!hasIron && Math.random() < 0.18) spawnAsteroid(astLvl <= 2 ? 'normal' : (Math.random() < 0.4 ? 'ice' : 'normal'));
      }
    }

    // Asteroid update + collisions
    const newFragments = [];
    asteroids = asteroids.filter(a => {
      a.y += a.speed;
      a.rotation += a.rotSpeed;
      if (a.flash > 0) a.flash--;
      if (a.y > H + 60 || a.x < -60 || a.x > W + 60) return false;

      // Bullet collision
      if (a.type !== 'iron') {
        let hit = false;
        bullets = bullets.filter(b => {
          if (hit) return true;
          if (Math.hypot(b.x - a.x, b.y - a.y) < a.size * 0.9) {
            a.hp--;
            a.flash = 10;
            spawnExplosion(b.x, b.y, false);
            if (a.hp <= 0) {
              hit = true;
              spawnExplosion(a.x, a.y, a.size > 22);
              score += a.type === 'ice' ? 15 : (a.size > 25 ? 20 : 10);
              if (a.type === 'ice') {
                iceSlowTimer = 280;
              } else if (a.type === 'normal' && a.size > 24 && !a.isFragment) {
                for (let f = 0; f < 2; f++) {
                  const ns = a.size * 0.52;
                  const n2 = 8;
                  newFragments.push({
                    type: 'normal', x: a.x, y: a.y,
                    size: ns, speed: a.speed * 1.3, hp: 1, maxHp: 1,
                    vx: 0, rotation: Math.random()*Math.PI*2,
                    rotSpeed: (Math.random()-0.5)*0.055,
                    shape: Array.from({length: n2}, () => 0.55 + Math.random()*0.5),
                    flash: 0, isFragment: true,
                  });
                }
                if (Math.random() < 0.10) powerups.push({ type: 'fuel', x: a.x, y: a.y, speed: 1.6, bobTimer: 0 });
              }
            }
            return false;
          }
          return true;
        });
        if (hit) return false;
      }
      // Iron asteroids: bullets pass through (invincible, but doesn't block shots)

      // Player collision
      if (!player.dead && Math.abs(a.x - player.x) < a.size + 16 && Math.abs(a.y - player.y) < a.size + 16) {
        spawnExplosion(a.x, a.y, true);
        if (player.shieldTimer > 0) {
          player.flash = 20;
        } else {
          lives--;
          player.flash = 50;
          if (lives <= 0) {
            player.dead = true;
            spawnExplosion(player.x, player.y, true);
            spawnExplosion(player.x + 15, player.y - 10, true);
          }
        }
        return false;
      }
      return true;
    });
    asteroids.push(...newFragments);
  }

  // Normal spawn — boss savaşında ve level bitiş bekleme aşamasında durur
  const levelEnding = currentLevel !== currentZone * 5 && getWave() > currentLevel * 5;
  if (!boss && !levelEnding) {
    spawnTimer++;
    const cfg      = getLevelConfig();
    const interval = cfg ? cfg.interval      : getSpawnInterval();
    const dChance  = cfg ? cfg.doubleChance  : getDoubleSpawnChance();
    if (spawnTimer >= interval) {
      spawnTimer = 0;
      spawnEnemy();
      // Suppress double enemy spawn when an iron asteroid is blocking a lane
      const ironActive = currentZone === 2 && asteroids.some(a => a.type === 'iron');
      if (Math.random() < dChance && !ironActive) spawnEnemy(Math.floor(Math.random() * 80 + 60));
    }
  }

  // Power-ups move + collect
  powerups = powerups.filter(p => {
    p.y += p.speed;
    p.bobTimer++;
    if (p.y > H + 20) return false;

    // Oyuncu topladı mı?
    if (Math.abs(p.x - player.x) < 28 && Math.abs(p.y - player.y) < 34) {
      if (p.type === 'shield') {
        player.shieldTimer = POWERUP_DURATION;
      } else if (p.type === 'triple') {
        player.tripleTimer = POWERUP_DURATION;
      } else if (p.type === 'double') {
        player.doubleTimer = POWERUP_DURATION;
      } else if (p.type === 'bomb') {
        activateBomb();
      } else if (p.type === 'fuel') {
        fuel = Math.min(FUEL_MAX, fuel + 28);
      }
      // Toplama efekti
      spawnCollectEffect(p.x, p.y, POWERUP_COLORS[p.type]);
      return false;
    }
    return true;
  });

  if (eBullets.length > 30) eBullets.splice(0, eBullets.length - 30); // unbounded growth engeli

  // Düşman mermileri: hareket + oyuncuya çarpma
  eBullets = eBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > H + 10) return false;

    if (!player.dead && Math.abs(b.x - player.x) < 24 && Math.abs(b.y - player.y) < 40) {
      if (player.shieldTimer > 0) {
        player.flash = 14;
      } else {
        lives--;
        player.flash = 50;
        if (lives <= 0) {
          player.dead = true;
          spawnExplosion(player.x, player.y, true);
          spawnExplosion(player.x + 15, player.y - 10, true);
          spawnExplosion(player.x - 15, player.y + 5, true);
        }
      }
      return false;
    }
    return true;
  });

  // Enemies
  enemies = enemies.filter(e => {
    e.y += e.speed;
    // Zikzak hareketi (bölüm 4)
    if (e.zigzag) {
      e.zigzagPhase += 0.055;
      e.x = LANE_CENTERS[e.lane] + Math.sin(e.zigzagPhase) * 40;
    }
    if (e.flash > 0) e.flash--;

    // Ateş etme — canShoot false ise hiç ateş etme
    e.fireTimer++;
    if (e.canShoot && e.fireTimer >= e.fireRate && e.y > 0) {
      e.fireTimer = 0;
      const activeLanes = new Set(eBullets.map(b => b.lane));
      if (activeLanes.size < 2 || activeLanes.has(e.lane)) {
        eBullets.push({
          x: e.x, y: e.y + 20,
          vx: 0, vy: 5,
          hp: e.maxHp,
          lane: e.lane,
        });
      }
    }

    // Bullet hits
    bullets = bullets.filter(b => {
      const sc  = ENEMY_TIER[e.maxHp].sc;
      const hit = Math.abs(b.x - e.x) < 22 * sc && Math.abs(b.y - e.y) < 26 * sc;
      if (hit) {
        e.hp--;
        e.flash = 14;
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, true);
          score += e.maxHp * 10;
          spawnPowerup(e.x, e.y);
        } else {
          spawnExplosion(e.x, e.y, false);
        }
      }
      return !hit;
    });

    if (e.hp <= 0) return false;

    // Reached player — kalkan varsa engelle
    if (e.y > H - 55) {
      spawnExplosion(e.x, e.y, true);
      if (player.shieldTimer > 0) {
        // Kalkan hasarı emer, ama bitmez
        player.flash = 20;
      } else {
        lives--;
        player.flash = 50;
        if (lives <= 0) {
          player.dead = true;
          spawnExplosion(player.x, player.y, true);
          spawnExplosion(player.x + 15, player.y - 10, true);
          spawnExplosion(player.x - 15, player.y + 5, true);
        }
      }
      return false;
    }

    return true;
  });

  // Explosions
  explosions = explosions.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= p.decay;
    return p.life > 0;
  });
}

// --- Draw: yuvarlak köşe yardımcısı ---
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- Draw: Ana Menü ---
function drawMenu() {
  ctx.fillStyle = '#00001a';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Başlık
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 26px Courier New';
  ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 16;
  ctx.fillText('SPACE SHOOTER', W / 2, 46);
  ctx.font = '11px Courier New';
  ctx.fillStyle = devMode ? '#ff0' : '#48a'; ctx.shadowBlur = 0;
  ctx.fillText(devMode ? '⚡ TEST MODE' : 'Choose a zone', W / 2, 70);
  ctx.restore();

  const CW = 280, CH = 420, CR = 16;
  const GAP = W - 60;   // kart başlangıçları arası mesafe (menuAnimX ile aynı birim)
  const CY = 108;       // kartın üst y'si

  MENU_CARDS.forEach((card, i) => {
    const cx = W / 2 - CW / 2 + i * GAP - menuAnimX; // sol kenar x
    if (cx > W + CW || cx < -CW) return;          // ekran dışı, çizme

    ctx.save();

    // Kart arka planı
    const bg = ctx.createLinearGradient(cx, CY, cx, CY + CH);
    bg.addColorStop(0, card.col1);
    bg.addColorStop(1, card.col2);
    ctx.fillStyle = bg;
    rrect(cx, CY, CW, CH, CR); ctx.fill();

    // Kart kenarlığı
    ctx.strokeStyle = card.locked ? '#1e2040' : (i === menuIdx ? '#0cf' : '#1a3060');
    ctx.lineWidth   = i === menuIdx && !card.locked ? 2.5 : 1.5;
    if (!card.locked && i === menuIdx) { ctx.shadowColor = '#0cf'; ctx.shadowBlur = 14; }
    rrect(cx, CY, CW, CH, CR); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    if (!card.locked) {
      // — İllüstrasyon alanı (gezegen + yıldızlar) —
      ctx.save();
      ctx.beginPath(); ctx.rect(cx, CY, CW, CH); ctx.clip();

      // Dekoratif gezegen
      const pg = ctx.createRadialGradient(cx + CW * 0.62, CY + 140, 20, cx + CW * 0.62, CY + 140, 80);
      pg.addColorStop(0, '#1a4aaa');
      pg.addColorStop(0.5, '#0a2060');
      pg.addColorStop(1, '#040820');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(cx + CW * 0.62, CY + 140, 72, 0, Math.PI * 2); ctx.fill();
      // Gezegen halkası
      ctx.strokeStyle = 'rgba(100,160,255,0.35)'; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.ellipse(cx + CW * 0.62, CY + 148, 105, 22, -0.3, 0, Math.PI * 2); ctx.stroke();
      // Küçük düşman silüetleri
      [[cx + 55, CY + 80, 0.55], [cx + 90, CY + 210, 0.45], [cx + 195, CY + 195, 0.5]].forEach(([ex, ey, sc]) => {
        ctx.save(); ctx.translate(ex, ey); ctx.scale(sc, sc);
        ctx.fillStyle = 'rgba(255,80,80,0.55)';
        ctx.beginPath();
        ctx.moveTo(0,16); ctx.lineTo(-14,-14); ctx.lineTo(-6,-8); ctx.lineTo(0,-16); ctx.lineTo(6,-8); ctx.lineTo(14,-14);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      });
      ctx.restore();

      // Başlık
      ctx.font = 'bold 22px Courier New';
      ctx.fillStyle = '#fff'; ctx.shadowColor = '#0cf'; ctx.shadowBlur = 10;
      ctx.fillText(card.name, cx + CW / 2, CY + CH - 145);
      ctx.shadowBlur = 0;

      ctx.font = '12px Courier New';
      ctx.fillStyle = '#7df';
      ctx.fillText(card.sub, cx + CW / 2, CY + CH - 118);

      ctx.font = '10px Courier New';
      ctx.fillStyle = '#46a';
      ctx.fillText('5 Level  •  1 Boss', cx + CW / 2, CY + CH - 97);

      // OYNA butonu
      const bx = cx + CW / 2 - 65, by = CY + CH - 78;
      const bGrd = ctx.createLinearGradient(bx, by, bx, by + 44);
      bGrd.addColorStop(0, '#0088cc');
      bGrd.addColorStop(1, '#0044aa');
      ctx.fillStyle = bGrd;
      ctx.shadowColor = '#0cf'; ctx.shadowBlur = 12;
      rrect(bx, by, 130, 44, 10); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 15px Courier New';
      ctx.fillText('PLAY', cx + CW / 2, by + 22);

    } else {
      // Kilitli kart
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      rrect(cx, CY, CW, CH, CR); ctx.fill();

      // Kilit ikonu (çizimle)
      const lx = cx + CW / 2, ly = CY + CH / 2 - 20;
      ctx.fillStyle = '#2a2a50';
      rrect(lx - 28, ly - 14, 56, 46, 8); ctx.fill();
      ctx.strokeStyle = '#2a2a50'; ctx.lineWidth = 10;
      ctx.beginPath(); ctx.arc(lx, ly - 18, 20, Math.PI, 0); ctx.stroke();
      ctx.strokeStyle = '#1a1a38'; ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(lx, ly - 18, 20, Math.PI, 0); ctx.stroke();
      ctx.fillStyle = '#3a3a6a';
      ctx.beginPath(); ctx.arc(lx, ly + 8, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(lx - 2, ly + 8, 4, 10);

      ctx.font = 'bold 16px Courier New';
      ctx.fillStyle = '#3a3a60';
      ctx.fillText(card.name, cx + CW / 2, CY + CH / 2 + 50);

      ctx.font = 'bold 10px Courier New';
      ctx.fillStyle = '#2a2a48';
      ctx.fillText('COMING SOON', cx + CW / 2, CY + CH / 2 + 74);
    }

    ctx.restore();
  });

  // Sol ok
  if (menuIdx > 0) {
    ctx.save(); ctx.globalAlpha = 0.7;
    ctx.fillStyle = 'rgba(0,180,255,0.18)';
    ctx.beginPath(); ctx.arc(28, H / 2 + 30, 22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0cf'; ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('‹', 28, H / 2 + 30);
    ctx.restore();
  }
  // Sağ ok
  if (menuIdx < MENU_CARDS.length - 1) {
    ctx.save(); ctx.globalAlpha = 0.7;
    ctx.fillStyle = 'rgba(0,180,255,0.18)';
    ctx.beginPath(); ctx.arc(W - 28, H / 2 + 30, 22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0cf'; ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('›', W - 28, H / 2 + 30);
    ctx.restore();
  }

  // Nokta göstergesi
  ctx.save();
  MENU_CARDS.forEach((_, i) => {
    ctx.fillStyle = i === menuIdx ? '#0cf' : '#224';
    ctx.beginPath(); ctx.arc(W / 2 + (i - 1.5) * 18, 626, i === menuIdx ? 5 : 3.5, 0, Math.PI * 2); ctx.fill();
  });

  // DEV butonu (sağ alt köşe)
  ctx.fillStyle = devMode ? 'rgba(255,200,0,0.25)' : 'rgba(255,255,255,0.08)';
  ctx.fillRect(W - 52, H - 36, 44, 26);
  ctx.strokeStyle = devMode ? 'rgba(255,200,0,0.6)' : 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(W - 52, H - 36, 44, 26);
  ctx.fillStyle = devMode ? '#fc0' : 'rgba(255,255,255,0.4)';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('DEV', W - 30, H - 19);

  ctx.restore();
}

// --- Draw: Level Map ---
function drawMap() {
  // Arka plan
  ctx.fillStyle = '#00001a';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Başlık
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 22px Courier New';
  ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 14;
  const zoneNames = ['', 'SPACE', 'ASTEROID BELT', 'NEBULA', 'BLACK HOLE'];
  ctx.fillText(`✦ ${zoneNames[currentZone] || 'LEVEL MAP'} ✦`, W / 2, 58);
  ctx.shadowBlur = 0;
  ctx.font = '11px Courier New';
  ctx.fillStyle = '#4af';
  ctx.fillText('Tap an unlocked level', W / 2, 82);
  ctx.restore();

  // Bağlantı çizgileri
  for (let i = 0; i < 4; i++) {
    const a = MAP_NODES[i], b = MAP_NODES[i + 1];
    const sa = levelStates[(currentZone-1)*5 + i], sb = levelStates[(currentZone-1)*5 + i + 1];
    ctx.save();
    ctx.lineWidth = 3;
    ctx.setLineDash([7, 6]);
    if (sa === 'completed' && sb === 'completed') {
      ctx.strokeStyle = '#f90'; ctx.shadowColor = '#f90'; ctx.shadowBlur = 6;
    } else if (sa === 'completed' || sa === 'unlocked') {
      ctx.strokeStyle = '#26a'; ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = '#223'; ctx.shadowBlur = 0;
    }
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    ctx.restore();
  }

  // Nodelar
  MAP_NODES.forEach((node, i) => {
    const li    = (currentZone - 1) * 5 + i;
    const st    = levelStates[li];
    const lvl   = li + 1;
    const isBoss = lvl % 5 === 0;
    const r     = isBoss ? 30 : 24;
    const pulse = 0.65 + 0.35 * Math.sin(frameCount * 0.06 + i * 0.8);

    ctx.save();
    ctx.translate(node.x, node.y);

    if (st === 'completed') {
      // Altın
      ctx.shadowColor = '#f90'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#7a3800';
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f90';
      ctx.beginPath(); ctx.arc(0, 0, r - 4, 0, Math.PI * 2); ctx.fill();
      // Tik işareti
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(-2, 6); ctx.lineTo(8, -6); ctx.stroke();
    } else if (st === 'unlocked') {
      // Siyan / parlak
      ctx.shadowColor = '#0cf'; ctx.shadowBlur = 16 * pulse;
      ctx.fillStyle = '#003344';
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(0,200,255,${0.75 * pulse})`;
      ctx.beginPath(); ctx.arc(0, 0, r - 4, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${isBoss ? 11 : 12}px Courier New`;
      ctx.fillText(lvl, 0, isBoss ? -5 : 0);
      if (isBoss) { ctx.font = 'bold 9px Courier New'; ctx.fillStyle = '#ff8'; ctx.fillText('BOSS', 0, 7); }
    } else {
      // Kilitli
      ctx.fillStyle = '#111122';
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#2a2a44'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
      // Kilit gövdesi
      ctx.fillStyle = '#2a2a44';
      ctx.fillRect(-6, -2, 12, 9);
      ctx.beginPath(); ctx.arc(0, -4, 6, Math.PI, 0); ctx.strokeStyle = '#2a2a44';
      ctx.lineWidth = 3; ctx.stroke();
    }
    ctx.restore();
  });

  // Geri butonu
  ctx.save();
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 13px Courier New';
  ctx.fillStyle = '#0cf'; ctx.shadowColor = '#0cf'; ctx.shadowBlur = 8;
  ctx.fillText('◀ BACK', 14, 28);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Alt bilgi
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '10px Courier New';
  ctx.fillStyle = '#446';
  ctx.fillText(`Level ${currentZone * 5} is a boss fight`, W / 2, 650);
  ctx.restore();
}

// --- Collect effect ---
function spawnCollectEffect(x, y, color) {
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2;
    const spd = Math.random() * 2.5 + 1;
    explosions.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 1, decay: 0.04,
      r: Math.random() * 3 + 1.5,
      color,
    });
  }
}

// --- Render ---
function render() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  if (state === 'intro') { drawIntro(); return; }
  if (state === 'zonetransition') { drawZoneTransition(); return; }
  if (state === 'menu') { drawMenu(); return; }
  if (state === 'map') { drawMap(); return; }

  if (currentZone === 2) {
    drawZone2Background();
  } else {
    ctx.fillStyle = '#000010';
    ctx.fillRect(0, 0, W, H);
    drawStars();
  }
  drawLanes();
  drawExplosions();

  asteroids.forEach(drawAsteroid);
  powerups.forEach(drawPowerup);
  bullets.forEach(drawBullet);
  eBullets.forEach(drawEBullet);
  enemies.forEach(drawEnemy);
  if (boss) drawBoss(boss);

  if ((state === 'play' || state === 'gameover') && !player.dead) {
    drawShip(player.x, player.y);
  }

  if (state === 'play' && tutorial) drawTutorial();

  // Zone 2 ice slow screen tint
  if (currentZone === 2 && iceSlowTimer > 0) {
    const iceAlpha = Math.min(0.28, iceSlowTimer / 300 * 0.28) * (0.7 + 0.3 * Math.sin(frameCount * 0.12));
    ctx.fillStyle = `rgba(140,210,255,${iceAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
  // Zone 2 magnetic field visual (edge arcs)
  if (currentZone === 2 && currentLevel === 9 && !boss) {
    const mp = 0.4 + 0.6 * Math.abs(Math.sin(frameCount * 0.04));
    ctx.save();
    ctx.globalAlpha = 0.22 * mp;
    const side = magnetDir > 0 ? W - 1 : 1;
    const mg = ctx.createLinearGradient(magnetDir > 0 ? W - 40 : 0, 0, magnetDir > 0 ? W : 40, 0);
    mg.addColorStop(0, 'rgba(0,0,0,0)'); mg.addColorStop(1, 'rgba(140,80,255,0.8)');
    if (magnetDir < 0) { mg.addColorStop(0, 'rgba(140,80,255,0.8)'); mg.addColorStop(1, 'rgba(0,0,0,0)'); }
    ctx.fillStyle = mg; ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  if (state === 'gameover') drawOverlay('GAME OVER', 'The enemy reached the ship!');

  if (state === 'levelcomplete') {
    if (levelCompleteType === 'clear') {
      // Sade bölüm tamamlama ekranı
      const t = 1 - bossKillTimer / 180;
      const fadeIn = Math.min(1, t * 5);
      ctx.save();
      ctx.fillStyle = `rgba(0,0,15,${Math.min(0.82, t * 2)})`;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = fadeIn;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold 13px Courier New';
      ctx.fillStyle = '#ffee88'; ctx.shadowColor = '#ff8'; ctx.shadowBlur = 10;
      ctx.fillText(`LEVEL ${currentLevel}`, W / 2, H / 2 - 50);
      ctx.font = 'bold 26px Courier New';
      ctx.fillStyle = '#fff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 22;
      ctx.fillText('AREA CLEARED!', W / 2, H / 2);
      ctx.font = '14px Courier New'; ctx.fillStyle = '#0ff'; ctx.shadowBlur = 8;
      ctx.fillText('SCORE: ' + score, W / 2, H / 2 + 44);
      ctx.font = '11px Courier New'; ctx.fillStyle = '#446'; ctx.shadowBlur = 0;
      ctx.fillText('Returning to map...', W / 2, H / 2 + 80);
      ctx.restore();

    } else {
      // ── BOSS ZAFERİ: GÖRKEMLI EKRAN ──
      const vt = victoryTime;

      // Koyu arka plan
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,10,0.88)';
      ctx.fillRect(0, 0, W, H);

      // Zafer parçacıkları — shadowBlur yok, glow katmanlı circle ile
      ctx.save();
      victoryParticles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life) * 0.28;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2); ctx.fill();
      });
      victoryParticles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        if (p.star) {
          ctx.save(); ctx.translate(p.x, p.y);
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
            const b = a + Math.PI / 5;
            i === 0 ? ctx.moveTo(Math.cos(a)*p.r, Math.sin(a)*p.r) : ctx.lineTo(Math.cos(a)*p.r, Math.sin(a)*p.r);
            ctx.lineTo(Math.cos(b)*p.r*0.4, Math.sin(b)*p.r*0.4);
          }
          ctx.closePath(); ctx.fill();
          ctx.restore();
        } else {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
        }
      });
      ctx.globalAlpha = 1;
      ctx.restore();

      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

      // "BÖLÜM X" küçük etiket — fade in
      const labelAlpha = Math.min(1, vt / 30);
      ctx.save();
      ctx.globalAlpha = labelAlpha;
      ctx.font = 'bold 13px Courier New';
      ctx.fillStyle = '#ffee44'; ctx.shadowColor = '#ff8'; ctx.shadowBlur = 12;
      ctx.fillText(`LEVEL ${currentLevel}  ·  BOSS DEFEATED`, W / 2, H / 2 - 130);
      ctx.restore();

      // "BÖLGE TEMİZLENDİ!" — bounce animasyonu
      const titleProgress = Math.min(1, vt / 45);
      const bounce = titleProgress < 0.6
        ? 1 + 0.55 * Math.sin(titleProgress * Math.PI / 0.6)
        : 1 + 0.08 * Math.sin((vt - 27) * 0.18);
      const titleAlpha = Math.min(1, vt / 20);
      ctx.save();
      ctx.globalAlpha = titleAlpha;
      ctx.translate(W / 2, H / 2 - 62);
      ctx.scale(bounce, bounce);
      ctx.font = 'bold 32px Courier New';
      const tGrd = ctx.createLinearGradient(-160, -20, 160, 20);
      tGrd.addColorStop(0,   '#ffe040');
      tGrd.addColorStop(0.5, '#ffffff');
      tGrd.addColorStop(1,   '#00ffff');
      ctx.fillStyle = tGrd;
      ctx.shadowColor = '#ffe040'; ctx.shadowBlur = 30;
      ctx.fillText('AREA CLEARED!', 0, 0);
      ctx.restore();

      // Yıldız süslemeler
      if (vt > 40) {
        const starAlpha = Math.min(1, (vt - 40) / 30);
        ctx.save(); ctx.globalAlpha = starAlpha;
        [W/2 - 130, W/2 + 130].forEach(sx => {
          ctx.font = '28px Courier New';
          ctx.fillStyle = '#ffe040'; ctx.shadowColor = '#ff8'; ctx.shadowBlur = 16;
          ctx.fillText('★', sx, H / 2 - 62);
        });
        ctx.restore();
      }

      // Skor
      if (vt > 55) {
        const scoreAlpha = Math.min(1, (vt - 55) / 25);
        ctx.save(); ctx.globalAlpha = scoreAlpha;
        ctx.font = 'bold 15px Courier New';
        ctx.fillStyle = '#aaddff'; ctx.shadowColor = '#0cf'; ctx.shadowBlur = 10;
        ctx.fillText('TOTAL SCORE', W / 2, H / 2 + 5);
        ctx.font = 'bold 38px Courier New';
        ctx.fillStyle = '#ffffff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 24;
        ctx.fillText(score, W / 2, H / 2 + 50);
        ctx.restore();
      }

      // Haritaya dön butonu
      if (vt > 90) {
        const btnAlpha = Math.min(1, (vt - 90) / 30);
        const btnPulse = 0.8 + 0.2 * Math.sin(vt * 0.08);
        const bx = W / 2 - 100, by = H - 145;
        ctx.save(); ctx.globalAlpha = btnAlpha * btnPulse;
        const bGrd = ctx.createLinearGradient(bx, by, bx, by + 50);
        bGrd.addColorStop(0, '#005599');
        bGrd.addColorStop(1, '#002244');
        ctx.fillStyle = bGrd;
        ctx.shadowColor = '#0cf'; ctx.shadowBlur = 18;
        rrect(bx, by, 200, 50, 12); ctx.fill();
        ctx.strokeStyle = '#0cf'; ctx.lineWidth = 1.5;
        rrect(bx, by, 200, 50, 12); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff'; ctx.font = 'bold 15px Courier New';
        ctx.globalAlpha = btnAlpha;
        ctx.fillText('RETURN TO MENU  ▶', W / 2, by + 25);
        ctx.restore();
      }

      ctx.restore();
    }
  }

  drawHUD();
}

// --- Loop ---
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

if (BOSS_MODE) {
  levelStates = levelStates.map(() => 'unlocked');
  startLevel(5);
  spawnBoss(25);
}

loop();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
