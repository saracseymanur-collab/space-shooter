<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Space Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 50%; left: 50%;
    width: 390px; height: 844px;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(var(--game-scale, 1));
    touch-action: none;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const spaceshipImg = new Image();
spaceshipImg.src = 'ASSETS/spaceship.png';

const enemyImgs = [null, new Image(), new Image(), new Image()];
enemyImgs[1].src = 'ASSETS/enemy1.png';
enemyImgs[2].src = 'ASSETS/enemy2.png';
enemyImgs[3].src = 'ASSETS/enemy3.png';

const bossImg = new Image();
bossImg.src = 'ASSETS/boss.png';
const BOSS_W = 190, BOSS_H = 127; // 1536×1024 oranında

// Düşman görsel boyutları — gerçek en/boy oranına göre (sıkı kırpılmış assetler)
const ENEMY_SIZES = { 1: { w: 58, h: 38 }, 2: { w: 82, h: 55 }, 3: { w: 108, h: 89 } };

// Sabit oyun alanı boyutu (390×844 — iPhone standart)
const W = 390;
const H = 844;

// Retina/HiDPI: fiziksel piksel sayısını artır, mantıksal koordinatlar değişmez
const DPR = Math.min(window.devicePixelRatio || 1, 2);
canvas.width  = W * DPR;
canvas.height = H * DPR;

// --- CSS ölçeği: mobilde tam ekran doldur, masaüstünde telefon boyutu ---
function updateScale() {
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  let scale;
  if (isMobile) {
    scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  } else {
    scale = Math.min(1, window.innerWidth / W, window.innerHeight / H);
  }
  document.documentElement.style.setProperty('--game-scale', scale);
}
updateScale();
window.addEventListener('resize', updateScale);

// --- Lanes ---
const LANE_COUNT = 3;
const LANE_W = W / LANE_COUNT;
const LANE_CENTERS = [LANE_W * 0.5, LANE_W * 1.5, LANE_W * 2.5];

// --- Harita node pozisyonları (5 level, dikey path) ---
const MAP_NODES = [
  { x: W / 2, y: H * 0.80 },
  { x: W / 2, y: H * 0.66 },
  { x: W / 2, y: H * 0.51 },
  { x: W / 2, y: H * 0.37 },
  { x: W / 2, y: H * 0.23 },
];

// --- Menu ---
const MENU_CARDS = [
  { name: 'SPACE',         sub: 'Clear the Enemies', locked: false, col1: '#001030', col2: '#002860' },
  { name: 'Asteroid Belt', sub: '',                  locked: true,  col1: '#150e04', col2: '#241808' },
  { name: 'Nebula',        sub: '',                  locked: true,  col1: '#160020', col2: '#240030' },
  { name: 'Black Hole',    sub: '',                  locked: true,  col1: '#040404', col2: '#0c0c0c' },
];
let menuIdx  = 0;   // hedef kart indexi
let menuAnimX = 0;  // smooth scroll x
let titleTapCount = 0, titleTapTimer = 0; // gizli test modu: başlığa 5x hızlı dokun
let devMode = false;

// --- Intro Cinematic ---
const INTRO_PANELS = [
  "Humanity discovered a new planet — Astra. Thousands of settlers set out with hope.",
  "Then the Dark Wave came. No one was ready. Two planets. One night.",
  "Those stranded on Astra transformed. Mutated. They could never return home — they were not welcomed.",
  "From the ruins, rage was born. They built the Void Colony. First to survive. Then for revenge.",
  "Now they are coming. The planet is weak. The army is gone.",
  "Only you remain. And that has to be enough.",
];
let introPanelIdx = 0;
let introAlpha = 0;
let introPhase = 'fadein'; // 'fadein' | 'show' | 'fadeout'

// --- Zone Transition ---
const ZONE_TRANSITION_MESSAGES = [
  "The advance fleet has been destroyed. But the main fleet retreated into the asteroid belt. You have no choice but to follow.",
  "The asteroid belt is clear. But the Void Colony's command center is hidden deep in the nebula. This ends there.",
  "The command center is down. Only their leader remains. They're waiting for you near the black hole.",
];
let zoneTransIdx = 0;
let zoneTransAlpha = 0;
let zoneTransPhase = 'fadein'; // 'fadein' | 'show'

// --- State ---
let state = 'intro';

// --- Tutorial ---
let tutorial = localStorage.getItem('ss_tutorial') ? null : { step: 0 }; // 0=swipe right, 1=swipe left
let score = 0;
let lives = 3;
let spawnTimer = 0;
let frameCount = 0;
let boss = null;
let lastWaveForBoss = -1;
let bossKillTimer = 0;
let returnToMap = false;
let levelCompleteType = 'boss'; // 'boss' | 'clear'
let victoryTime = 0;
let victoryParticles = [];

// --- Level sistemi ---
let currentLevel = 1;
const TEST_MODE = new URLSearchParams(window.location.search).get('test') === 'true';
const BOSS_MODE = new URLSearchParams(window.location.search).get('boss') === 'true';
function loadLevelStates() {
  if (TEST_MODE) return Array.from({length: 10}, () => 'unlocked');
  try {
    const saved = JSON.parse(localStorage.getItem('ss_levels'));
    if (Array.isArray(saved) && saved.length === 10) return saved;
    if (Array.isArray(saved) && saved.length === 5) {
      return [...saved, ...Array.from({length: 5}, () => 'locked')];
    }
  } catch(e) {}
  const s = Array.from({length: 10}, () => 'locked');
  s[0] = 'unlocked';
  return s;
}
function saveLevelStates() {
  try { localStorage.setItem('ss_levels', JSON.stringify(levelStates)); } catch(e) {}
}
function loadZoneUnlocked() {
  try {
    const saved = JSON.parse(localStorage.getItem('ss_zones'));
    if (Array.isArray(saved) && saved.length === 4) return saved;
  } catch(e) {}
  return [false, true, true, true]; // true = locked
}
function saveZoneStates() {
  try { localStorage.setItem('ss_zones', JSON.stringify(MENU_CARDS.map(c => c.locked))); } catch(e) {}
}
let levelStates = loadLevelStates();
// Apply saved zone locks
(function() {
  const zl = loadZoneUnlocked();
  MENU_CARDS.forEach((c, i) => { c.locked = zl[i]; });
})();

let currentZone = 1;

// --- Zone 2 mechanics ---
let asteroids = [];
let asteroidSpawnTimer = 0;
let fuel = 100;
const FUEL_MAX = 100;
const FUEL_DRAIN = 0.016; // per frame
let iceSlowTimer = 0;
let magnetDir = 1;
let magnetSwitchTimer = 320;

// Zorluk: tüm parametreler frameCount'tan türetilir (smooth, ayrık wave yok)
function gameSec()  { return frameCount / 60; }
function getWave()  { return Math.floor(gameSec() / 14) + 1; } // her 14s bir dalga

// Spawn aralığı: 80 frame → 36 frame, 160 saniyede lineer düşer
function getSpawnInterval() {
  return Math.max(36, Math.round(80 - gameSec() * 0.46));
}

// Düşman hızı: 1.3 → 3.0, 4 dakikada lineer artar
function getEnemySpeed() {
  return Math.min(3.0, 1.8 + gameSec() / 240 * 1.7) + Math.random() * 0.35;
}

// Düşman HP olasılığı: 2HP 30s'de yavaşça girer, 3HP 2dk'da girer
function getEnemyHp() {
  const t = gameSec();
  const p3 = Math.max(0, Math.min(0.38, (t - 120) / 200));
  const p2 = Math.max(0, Math.min(0.52, (t - 30)  / 160));
  const r = Math.random();
  return r < p3 ? 3 : r < p3 + p2 ? 2 : 1;
}

// Çift spawn şansı: 1 dakikadan itibaren %0 → %48 lineer
function getDoubleSpawnChance() {
  return Math.max(0, Math.min(0.48, (gameSec() - 60) / 200));
}

// Bölüm 1-4 için sabit level konfigürasyonu (5 = özel boss, 6+ smooth sistem)
function getLevelConfig() {
  switch (currentLevel) {
    case 1: {
      const lw = getWave() - (currentLevel - 1) * 5; // level içi dalga (1-4)
      return {
        interval: Math.max(34, 72 - (lw - 1) * 14),  // 72→58→44→34
        doubleChance: 0.12 + (lw - 1) * 0.2,         // 12%→32%→52%→72%
        speed: () => 1.4 + Math.random() * 0.35,
        hp: () => { const r = Math.random(); return r < 0.45 ? 1 : r < 0.78 ? 2 : 3; },
        canShoot: false, zigzag: false,
      };
    }
    case 2: return {
      interval: 58, doubleChance: 0.30,
      speed: () => 1.6 + Math.random() * 0.4,
      hp: () => Math.random() < 0.45 ? 2 : 1,
      canShoot: true, zigzag: false,
    };
    case 3: return {
      interval: 62, doubleChance: 0.3,
      // %40 ihtimalle hızlı küçük düşman
      speed: () => Math.random() < 0.4 ? 3.2 + Math.random() * 0.5 : 1.9 + Math.random() * 0.4,
      hp: () => Math.random() < 0.35 ? 2 : 1,
      canShoot: true, zigzag: false,
    };
    case 4: return {
      interval: 72, doubleChance: 0.25,
      speed: () => 1.9 + Math.random() * 0.5,
      hp: () => Math.random() < 0.4 ? 2 : 1,
      canShoot: false, zigzag: true,
    };
    case 6: return { // Zone 2 L1: light enemies
      interval: 75, doubleChance: 0.15,
      speed: () => 1.5 + Math.random() * 0.4,
      hp: () => Math.random() < 0.35 ? 2 : 1,
      canShoot: false, zigzag: false,
    };
    case 7: return { // Zone 2 L2: iron asteroids + enemies
      interval: 68, doubleChance: 0.25,
      speed: () => 1.7 + Math.random() * 0.4,
      hp: () => Math.random() < 0.4 ? 2 : 1,
      canShoot: true, zigzag: false,
    };
    case 8: return { // Zone 2 L3: ice asteroids + enemies
      interval: 65, doubleChance: 0.28,
      speed: () => 1.8 + Math.random() * 0.5,
      hp: () => Math.random() < 0.45 ? 2 : 1,
      canShoot: true, zigzag: false,
    };
    case 9: return { // Zone 2 L4: magnetic field + enemies
      interval: 70, doubleChance: 0.22,
      speed: () => 1.6 + Math.random() * 0.4,
      hp: () => Math.random() < 0.4 ? 2 : 1,
      canShoot: true, zigzag: true,
    };
    default: return null;
  }
}

// --- Stars ---
const STAR_COUNT = 80;
let stars = Array.from({ length: STAR_COUNT }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  s: Math.random() * 1.5 + 0.3, spd: Math.random() * 1.5 + 0.5,
}));

// --- Player ---
let player = {
  lane: 1, targetLane: 1,
  x: LANE_CENTERS[1], y: H - 160,
  w: 40, h: 50,
  fireTimer: 0, fireRate: 10,
  dead: false, deathTimer: 0, flash: 0,
  shieldTimer: 0,
  doubleTimer: 0,
  tripleTimer: 0,
};

const POWERUP_DURATION = 300; // 5 sn @ 60fps

// --- Arrays ---
let bullets  = [];  // oyuncu mermileri
let eBullets = [];  // düşman mermileri
let enemies  = [];
let explosions = [];
let powerups = [];

// --- Input ---
let keys = {};
let keyHandled = {};

document.addEventListener('keydown', e => {
  if (!keys[e.code]) keyHandled[e.code] = false;
  keys[e.code] = true;
  if (state === 'intro') {
    if (e.code === 'Escape') { state = 'menu'; return; }
    if ((e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') && introPhase === 'show') {
      introPhase = 'fadeout'; return;
    }
    return;
  }
  if (state === 'zonetransition') {
    if ((e.code === 'Space' || e.code === 'Enter') && zoneTransPhase === 'show') {
      state = 'menu'; return;
    }
    return;
  }
  if (state === 'menu') {
    if (e.code === 'ArrowLeft')  menuIdx = Math.max(0, menuIdx - 1);
    if (e.code === 'ArrowRight') menuIdx = Math.min(MENU_CARDS.length - 1, menuIdx + 1);
    if ((e.code === 'Enter' || e.code === 'Space') && !MENU_CARDS[menuIdx].locked) { currentZone = menuIdx + 1; state = 'map'; }
    return;
  }
  if (state === 'map') {
    if (e.code === 'Escape') state = 'menu';
  }
  if (state === 'gameover') {
    if (e.code === 'Space' || e.code === 'Enter') state = 'map';
    return;
  }
  if (state === 'play') {
    if (e.code === 'ArrowLeft' && !keyHandled[e.code]) {
      keyHandled[e.code] = true;
      if (player.targetLane > 0) player.targetLane--;
    }
    if (e.code === 'ArrowRight' && !keyHandled[e.code]) {
      keyHandled[e.code] = true;
      if (player.targetLane < 2) player.targetLane++;
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; keyHandled[e.code] = false; });

// --- Touch / Swipe Kontrolleri ---
// Document seviyesinde tüm default touch davranışlarını engelle
['touchstart','touchmove','touchend','touchcancel'].forEach(evt => {
  document.addEventListener(evt, e => { e.preventDefault(); }, { passive: false });
});

let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let swipeFired = false; // her dokunuşta tek swipe

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
  swipeFired = false;
}, { passive: false });

// Oyun içi swipe: parmak kalkmadan, 10px hareket eder etmez anında tetikle
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'play' || swipeFired) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
    if (dx < 0 && player.targetLane > 0) player.targetLane--;
    if (dx > 0 && player.targetLane < 2) player.targetLane++;
    swipeFired = true;
    if (tutorial) {
      if (dx > 0 && tutorial.step === 0) tutorial.step = 1;
      else if (dx < 0 && tutorial.step === 1) { localStorage.setItem('ss_tutorial', '1'); tutorial = null; }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);

  // Tap → click olarak ilet (swipe olmadıysa)
  if (!swipeFired && absDx < 12 && absDy < 12 && dt < 300) {
    canvas.dispatchEvent(new MouseEvent('click', {
      clientX: t.clientX, clientY: t.clientY, bubbles: true
    }));
    return;
  }

  // Menüde yatay swipe → kart değiştir
  if (state === 'menu' && absDx > absDy && absDx > 20) {
    if (dx < 0) menuIdx = Math.min(MENU_CARDS.length - 1, menuIdx + 1);
    if (dx > 0) menuIdx = Math.max(0, menuIdx - 1);
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => { e.preventDefault(); swipeFired = false; }, { passive: false });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top)  * (H / rect.height);

  if (state === 'intro') {
    // Skip button: top right
    if (mx > W - 90 && my < 44) { state = 'menu'; return; }
    // Anywhere else advances panel
    if (introPhase === 'show') { introPhase = 'fadeout'; return; }
    return;
  }

  if (state === 'gameover') {
    const btnY = H / 2 + 58;
    if (mx > W / 2 - 100 && mx < W / 2 + 100 && my > btnY - 20 && my < btnY + 20) {
      state = 'map'; return;
    }
  }

  if (state === 'menu') {
    // Sol ok
    if (mx < 52 && my > 100 && my < H - 80) { menuIdx = Math.max(0, menuIdx - 1); return; }
    // Sağ ok
    if (mx > W - 52 && my > 100 && my < H - 80) { menuIdx = Math.min(MENU_CARDS.length - 1, menuIdx + 1); return; }
    // DEV butonu (sağ alt)
    if (mx > W - 52 && my > H - 36) {
      devMode = !devMode;
      levelStates = devMode ? levelStates.map(() => 'unlocked') : loadLevelStates();
      return;
    }
    // OYNA butonu (merkez kart, kilitli değilse)
    if (!MENU_CARDS[menuIdx].locked) {
      if (mx > W/2 - 65 && mx < W/2 + 65 && my > 450 && my < 494) { currentZone = menuIdx + 1; state = 'map'; return; }
    }
    return;
  }

  if (state === 'levelcomplete' && levelCompleteType === 'boss' && victoryTime > 90) {
    if (mx > W/2 - 100 && mx < W/2 + 100 && my > H - 145 && my < H - 95) {
      returnToMap = false;
      const zone = Math.ceil(currentLevel / 5);
      if (zone >= 1 && zone <= 3) {
        zoneTransIdx = zone - 1;
        zoneTransAlpha = 0;
        zoneTransPhase = 'fadein';
        state = 'zonetransition';
      } else {
        state = 'menu';
      }
      return;
    }
  }

  if (state === 'zonetransition' && zoneTransPhase === 'show') {
    state = 'menu'; return;
  }

  if (state === 'play') {
    // Geri butonu (sol üst, HUD altı)
    if (mx > 6 && mx < 58 && my > 44 && my < 70) { state = 'map'; return; }
  }

  if (state === 'map') {
    // Geri butonu (sol üst)
    if (mx < 60 && my < 52) { state = 'menu'; return; }
    MAP_NODES.forEach((node, i) => {
      const li = (currentZone - 1) * 5 + i;
      if (levelStates[li] === 'locked') return;
      if (Math.hypot(mx - node.x, my - node.y) < 32) startLevel(li + 1);
    });
  }
});

// --- Level Başlatma ---
function startLevel(level) {
  currentLevel = level;
  currentZone = Math.ceil(level / 5);
  score = 0; lives = 3;
  spawnTimer = 0;
  frameCount     = (level - 1) * 4200;
  lastWaveForBoss = (level - 1) * 5;
  bullets = []; eBullets = []; enemies = []; explosions = []; powerups = [];
  asteroids = []; asteroidSpawnTimer = 0;
  boss = null; bossKillTimer = 0; returnToMap = false;
  // Zone 2 mechanics reset
  fuel = FUEL_MAX; iceSlowTimer = 0; magnetDir = 1; magnetSwitchTimer = 320;
  player.lane = 1; player.targetLane = 1;
  player.x = LANE_CENTERS[1];
  player.dead = false; player.deathTimer = 0; player.flash = 0;
  player.shieldTimer = 0; player.doubleTimer = 0; player.tripleTimer = 0;
  state = 'play';
}

// --- Spawn helpers ---
function spawnEnemy(yOffset = 0) {
  // Block lanes occupied by enemies or asteroids near the top
  const occupied = new Set(enemies.map(e => e.lane));
  asteroids.forEach(a => {
    if (a.y < H * 0.42) {
      LANE_CENTERS.forEach((lc, li) => { if (Math.abs(a.x - lc) < LANE_W * 0.65) occupied.add(li); });
    }
  });
  const free = [0, 1, 2].filter(l => !occupied.has(l));
  if (free.length === 0) return;

  const lane = free[Math.floor(Math.random() * free.length)];
  const cfg  = getLevelConfig();
  const hp    = cfg ? cfg.hp()    : getEnemyHp();
  const speed = cfg ? cfg.speed() : getEnemySpeed();
  const canShoot = cfg ? cfg.canShoot : true;
  const zigzag   = cfg ? cfg.zigzag   : false;
  const fireRate = hp === 3 ? 180 : hp === 2 ? 110 : 140;
  enemies.push({
    lane, x: LANE_CENTERS[lane], y: -40 - yOffset, w: 38, h: 44,
    hp, maxHp: hp, speed, flash: 0,
    fireTimer: Math.floor(Math.random() * fireRate), fireRate,
    canShoot,
    zigzag, zigzagPhase: Math.random() * Math.PI * 2,
  });
}

function spawnBoss(wave) {
  const bossNum = Math.floor(wave / 5);
  const isZone1Final = (currentLevel === 5);
  const isZone2Final = (currentLevel === 10);
  const special = isZone1Final || isZone2Final;
  const hp = isZone2Final ? 130 : isZone1Final ? 90 : 25 + bossNum * 10;
  boss = {
    x: W / 2, y: special ? H * 0.14 : H * 0.13,
    vx: isZone2Final ? 2.2 : special ? 1.9 : 1.2 + bossNum * 0.2,
    hp, maxHp: hp, flash: 0,
    fireTimer: 0,
    nextFireIn: special ? 28 : 55,
    bossNum, special, zone: currentZone,
  };
  enemies = [];
  asteroids = []; // clear asteroids during boss fight
}

function spawnExplosion(x, y, big) {
  const count = big ? 22 : 12;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * (big ? 4 : 2.5) + 0.5;
    explosions.push({
      x, y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * (big ? 5 : 3) + 1,
      color: `hsl(${Math.floor(Math.random() * 60 + 10)}, 100%, 60%)`,
    });
  }
}

function spawnPowerup(x, y) {
  if (currentZone === 2) {
    if (Math.random() > 0.10) return;
    const types = ['fuel', 'fuel', 'fuel', 'shield', 'triple', 'double', 'bomb'];
    const type = types[Math.floor(Math.random() * types.length)];
    powerups.push({ type, x, y, speed: 1.8, bobTimer: 0 });
    return;
  }
  if (Math.random() > 0.04) return;
  const cfg = getLevelConfig();
  const enemyShoots = cfg ? cfg.canShoot : true;
  const types = enemyShoots ? ['shield', 'triple', 'double', 'bomb'] : ['triple', 'double', 'bomb'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({ type, x, y, speed: 1.8, bobTimer: 0 });
}

function spawnAsteroid(type, ox, oy, osize) {
  const sz = osize ?? (type === 'iron' ? 26 + Math.random() * 14
                     : type === 'ice'  ? 18 + Math.random() * 14
                                       : 14 + Math.random() * 20);
  const n = 8;
  const shape = Array.from({length: n}, () => 0.55 + Math.random() * 0.5);

  // Pick a free lane (not blocked by an enemy or another asteroid near the top)
  // Iron asteroids are restricted to side lanes (0 or 2) so the middle stays passable
  let ax;
  if (ox !== undefined) {
    ax = ox;
  } else {
    const blocked = new Set();
    enemies.forEach(e => { if (e.y < H * 0.45) blocked.add(e.lane); });
    asteroids.forEach(a => {
      if (a.y < H * 0.42) {
        LANE_CENTERS.forEach((lc, li) => { if (Math.abs(a.x - lc) < LANE_W * 0.65) blocked.add(li); });
      }
    });
    const candidates = (type === 'iron') ? [0, 2] : [0, 1, 2];
    const free = candidates.filter(l => !blocked.has(l));
    const pool = free.length > 0 ? free : candidates;
    const lane = pool[Math.floor(Math.random() * pool.length)];
    ax = LANE_CENTERS[lane];
  }

  asteroids.push({
    type,
    x: ax,
    y: oy ?? -sz - 10,
    size: sz,
    speed: (osize ? 1.6 : 1.0) + Math.random() * 1.2,
    hp: type === 'normal' ? Math.max(1, Math.floor(sz / 14)) : type === 'ice' ? 1 : Infinity,
    maxHp: type === 'normal' ? Math.max(1, Math.floor(sz / 14)) : 1,
    vx: 0,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.032,
    shape,
    flash: 0,
    isFragment: !!osize,
  });
}

// --- Draw: Zone 2 Background ---
function drawZone2Background() {
  // Warm dark rocky space
  ctx.fillStyle = '#0c0804';
  ctx.fillRect(0, 0, W, H);
  // Amber nebula glow patches
  [[W*0.75, H*0.25, 260, 'rgba(90,45,8,0.18)'], [W*0.2, H*0.65, 200, 'rgba(70,30,5,0.14)'], [W*0.5, H*0.5, 320, 'rgba(50,20,2,0.09)']].forEach(([gx,gy,gr,gc]) => {
    const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
    g.addColorStop(0, gc); g.addColorStop(1, 'rgba(0,0,0,0)');

// --- Draw: Asteroid ---
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rotation);
  ctx.globalAlpha = a.flash > 0 ? (a.flash % 4 < 2 ? 0.35 : 1) : 1;
  const r = a.size;
  const n = a.shape.length;
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const pr = r * a.shape[i];
    if (i === 0) ctx.moveTo(Math.cos(angle) * pr, Math.sin(angle) * pr);
    else ctx.lineTo(Math.cos(angle) * pr, Math.sin(angle) * pr);
  }
  ctx.closePath();
  if (a.type === 'ice') {
    ctx.fillStyle = 'rgba(140,210,255,0.78)';
    ctx.strokeStyle = '#ccecff'; ctx.lineWidth = 2;
  } else if (a.type === 'iron') {
    ctx.fillStyle = '#4a5a6a';
    ctx.strokeStyle = '#8899aa'; ctx.lineWidth = 2.5;
  } else {
    ctx.fillStyle = '#7a5535';
    ctx.strokeStyle = '#9a7050'; ctx.lineWidth = 1.5;
  }
  ctx.fill(); ctx.stroke();
  // Highlight
  ctx.globalAlpha *= (a.type === 'iron' ? 0.45 : 0.55);
  ctx.fillStyle = a.type === 'ice' ? '#ddf4ff' : a.type === 'iron' ? '#aabccc' : '#c09060';
  ctx.beginPath(); ctx.arc(-r * 0.18, -r * 0.24, r * 0.22, 0, Math.PI * 2); ctx.fill();
  // Iron: warning X mark
  if (a.type === 'iron') {
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = '#ff6633'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-r*0.25, -r*0.25); ctx.lineTo(r*0.25, r*0.25); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.25, -r*0.25); ctx.lineTo(-r*0.25, r*0.25); ctx.stroke();
  }
  // HP bar for destructible normal
  if (a.type === 'normal' && a.maxHp > 1) {
    ctx.globalAlpha = 0.8;
    const bw = r * 1.2, bh = 4, bx = -bw/2, by = r + 3;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#c09060'; ctx.fillRect(bx, by, bw * (a.hp / a.maxHp), bh);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Draw: Zone Transition ---
function drawZoneTransition() {
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  ctx.save();

  // Fade overlay
  ctx.fillStyle = `rgba(0,0,8,${1 - zoneTransAlpha})`;
  ctx.fillRect(0, 0, W, H);

  ctx.globalAlpha = zoneTransAlpha;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Decorative separator line
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40, H / 2 - 80); ctx.lineTo(W - 40, H / 2 - 80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(40, H / 2 + 80); ctx.lineTo(W - 40, H / 2 + 80); ctx.stroke();

  // Message text — word-wrapped
  const text = ZONE_TRANSITION_MESSAGES[zoneTransIdx];
  ctx.font = '20px Courier New';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(200,220,255,0.35)';
  ctx.shadowBlur = 8;

  const maxWidth = W - 80;
  const lineH = 32;
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth) { lines.push(cur); cur = w; }
    else cur = test;
  });
  lines.push(cur);

  const totalH = lines.length * lineH;
  const startY = H / 2 - totalH / 2;
  lines.forEach((line, i) => ctx.fillText(line, W / 2, startY + i * lineH));

  // "Tap to continue" hint
  if (zoneTransPhase === 'show') {
    const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.06);
    ctx.globalAlpha = zoneTransAlpha * pulse;
    ctx.font = '11px Courier New';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.shadowBlur = 0;
    ctx.fillText('TAP TO CONTINUE', W / 2, H - 38);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Draw: Ship ---
const SHIP_W = 90, SHIP_H = 90; // görsel boyutu (1024×1024 kare)

function drawShip(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Hasar yanıp sönme
  ctx.globalAlpha = player.flash > 0 ? (Math.sin(player.flash * 1.5) > 0 ? 0.25 : 1) : 1;

  // Spaceship görseli (altta)
  if (spaceshipImg.complete && spaceshipImg.naturalWidth > 0) {
    ctx.drawImage(spaceshipImg, -SHIP_W / 2, -SHIP_H / 2, SHIP_W, SHIP_H);
  }

  // Kalkan efekti (geminin üstünde, stroke yok)

    const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.15);
    const shieldAlpha = Math.min(1, player.shieldTimer / 40) * pulse;
    // Halka: içi boş, kenarda yoğunlaşan gradient — net koruyucu balon hissi
    const sg = ctx.createRadialGradient(0, 0, 42, 0, 0, 62);
    sg.addColorStop(0,    `rgba(0, 180, 255, 0)`);
    sg.addColorStop(0.72, `rgba(0, 200, 255, ${shieldAlpha * 0.25})`);
    sg.addColorStop(0.88, `rgba(80, 220, 255, ${shieldAlpha * 0.75})`);
    sg.addColorStop(1,    `rgba(180, 240, 255, ${shieldAlpha * 0.55})`);
    ctx.globalAlpha = 1;
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(0, 0, 62, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Draw: Enemy ---
// Tier özellikleri: 1HP=küçük+mavi, 2HP=orta+turuncu, 3HP=büyük+kırmızı
const ENEMY_TIER = {
  1: { sc: 0.95, body: '#1e7acc', core: '#7dd4ff', glow: '#1e7acc' },
  2: { sc: 1.30, body: '#c86010', core: '#ffcc77', glow: '#ff8820' },
  3: { sc: 1.75, body: '#c01818', core: '#ff8888', glow: '#ff2020' },
};

function drawEnemy(e) {
  const sz   = ENEMY_SIZES[e.maxHp] ?? { w: 80, h: 60 };
  const dw   = sz.w, dh = sz.h;
  const img  = enemyImgs[e.maxHp];

  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.globalAlpha = e.flash > 0 ? (e.flash % 6 < 3 ? 0.3 : 1) : 1;

  // Görsel — merkeze hizalı, gerçek en/boy oranıyla
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
  }

  // HP bar — geminin gerçek alt kenarına dayalı
  const barY = dh / 2 + 4;
  const barW = dw * 0.30 * e.maxHp, barH = 5; // 1x / 2x / 3x
  // Bar rengi: düşman tipine göre ton, can azaldıkça açılır
  const ENEMY_HUE = { 1: 125, 2: 48, 3: 350 }; // yeşil / sarı / kırmızı
  const ratio = e.hp / e.maxHp;
  const hue = ENEMY_HUE[e.maxHp] ?? 0;
  const sat  = Math.round(15 + ratio * 45);  // tam can=orta doygun(%60) → sıfır=soluk(%15)
  const lum  = Math.round(22 + ratio * 18);  // tam can=orta(%40) → sıfır=koyu(%22)
  const barColor = `hsl(${hue}, ${sat}%, ${lum}%)`;
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = `hsla(${hue}, 40%, 10%, 0.7)`;
  ctx.fillRect(-barW / 2, barY, barW, barH);
  ctx.fillStyle = barColor;
  ctx.fillRect(-barW / 2, barY, barW * ratio, barH);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Draw: Boss ---
function drawBoss(b) {
  const sc    = b.special ? 1.45 : 1.0;
  const phase = b.phase || 1;
  const pulse = 0.6 + 0.4 * Math.sin(frameCount * (phase === 3 ? 0.22 : 0.07));
  const flashAlpha = b.flash > 0 ? (b.flash % 6 < 3 ? 0.25 : 1) : 1;

  // Faz renk paleti
  const palettes = {
    1: { aura1: '180,0,255', aura2: '100,0,200', wing: '#550099', wingGlow: '#9900cc', body: '#7700bb', bodyGlow: '#cc44ff', core1: '255,220,255', core2: '210,80,255', core3: '140,0,255', gun: '#ff99ff' },
    2: { aura1: '220,0,180', aura2: '140,0,120', wing: '#880055', wingGlow: '#dd0088', body: '#aa0066', bodyGlow: '#ff22aa', core1: '255,200,240', core2: '255,60,180', core3: '180,0,120', gun: '#ff88cc' },
    3: { aura1: '255,40,0',  aura2: '180,0,0',   wing: '#991100', wingGlow: '#ff3300', body: '#cc2200', bodyGlow: '#ff6600', core1: '255,220,180', core2: '255,100,20', core3: '200,40,0',  gun: '#ffaa44' },
  };
  const p = palettes[phase];

  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.scale(sc, sc);
  ctx.globalAlpha = flashAlpha;

  // Dış aura — gradient yerine 2 transparan circle
  ctx.fillStyle = `rgba(${p.aura1},${0.18 * pulse})`;
  ctx.beginPath(); ctx.arc(0, 0, 75, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = `rgba(${p.aura1},${0.22 * pulse})`;
  ctx.beginPath(); ctx.arc(0, 0, 48, 0, Math.PI * 2); ctx.fill();

  // Boss görseli
  if (bossImg.complete && bossImg.naturalWidth > 0) {
    const bw = BOSS_W, bh = BOSS_H;
    ctx.shadowColor = p.bodyGlow; ctx.shadowBlur = 18;
    ctx.drawImage(bossImg, -bw / 2, -bh / 2, bw, bh);
    ctx.shadowBlur = 0;
  }

  // Çekirdek parıltısı — faz renginde nabız
  ctx.fillStyle = `rgba(${p.core2},${0.35 * pulse})`; ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(${p.core1},${0.55 * pulse})`; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();

  // Faz 3: alev efekti — gradient yerine transparan circle'lar
  if (phase === 3) {
    ctx.globalAlpha = flashAlpha * 0.45 * pulse;
    [-28, 0, 28].forEach(fx => {
      ctx.fillStyle = 'rgba(255,80,0,0.5)';  ctx.beginPath(); ctx.arc(fx,62,18,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,180,0,0.7)'; ctx.beginPath(); ctx.arc(fx,58,10,0,Math.PI*2); ctx.fill();
    });
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Draw: Enemy Bullet ---
// Gradient ve shadowBlur yerine katmanlı circle — çok daha hızlı
function drawEBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.big) {
    const r = 16 + 3 * Math.sin(frameCount * 0.18);
    ctx.fillStyle = 'rgba(150,24,45,0.22)';  ctx.beginPath(); ctx.arc(0,0,r+10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(200,40,60,0.55)';  ctx.beginPath(); ctx.arc(0,0,r+4,0,Math.PI*2);  ctx.fill();
    ctx.fillStyle = 'rgba(240,80,90,0.9)';   ctx.beginPath(); ctx.arc(0,0,r-2,0,Math.PI*2);  ctx.fill();
    ctx.fillStyle = '#ffaaaa';               ctx.beginPath(); ctx.arc(0,0,r*0.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }

  // Kırmızı ton paleti — koyu: #96182d (150,24,45)
  const isBoss = b.fromBoss;
  const [c3, c2, c1] = isBoss
    ? ['rgba(150,24,45,0.20)', 'rgba(200,40,60,0.65)', 'rgba(255,120,130,1)']
    : b.hp === 3
    ? ['rgba(150,24,45,0.20)', 'rgba(190,30,50,0.65)', 'rgba(240,70,85,1)']
    : b.hp === 2
    ? ['rgba(150,24,45,0.18)', 'rgba(200,40,60,0.60)', 'rgba(255,90,100,1)']
    : ['rgba(150,24,45,0.15)', 'rgba(210,50,65,0.55)', 'rgba(255,110,120,1)'];

  const r = isBoss ? 11 : 9;
  ctx.fillStyle = c3; ctx.beginPath(); ctx.arc(0,0,r+6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = c2; ctx.beginPath(); ctx.arc(0,0,r+1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = c1; ctx.beginPath(); ctx.arc(0,0,r-2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// --- Draw: Player Bullet ---
function drawTutorial() {
  const step = tutorial.step;
  const dir  = step === 0 ? 1 : -1; // 1=sağ, -1=sol
  const label = step === 0 ? 'SWIPE RIGHT' : 'SWIPE LEFT';

  // Ok animasyonu: ileri-geri kayma + nabız
  const slide   = Math.sin(frameCount * 0.07) * 14;
  const opacity = 0.55 + 0.45 * Math.sin(frameCount * 0.07);

  const cx = W / 2;
  const cy = H - 110;

  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.translate(cx + dir * slide, cy);

  // Ok gövdesi
  const aw = 52, ah = 18, tipW = 30, tipH = 38;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  if (dir === 1) {
    // → sağ ok
    ctx.moveTo(-aw, -ah / 2);
    ctx.lineTo(aw - tipW, -ah / 2);
    ctx.lineTo(aw - tipW, -tipH / 2);
    ctx.lineTo(aw, 0);
    ctx.lineTo(aw - tipW, tipH / 2);
    ctx.lineTo(aw - tipW, ah / 2);
    ctx.lineTo(-aw, ah / 2);
  } else {
    // ← sol ok
    ctx.moveTo(aw, -ah / 2);
    ctx.lineTo(-aw + tipW, -ah / 2);
    ctx.lineTo(-aw + tipW, -tipH / 2);
    ctx.lineTo(-aw, 0);
    ctx.lineTo(-aw + tipW, tipH / 2);
    ctx.lineTo(-aw + tipW, ah / 2);
    ctx.lineTo(aw, ah / 2);
  }
  ctx.closePath();
  ctx.fill();

  // Yazı
  ctx.globalAlpha = opacity;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 15px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(label, 0, 28);

  ctx.restore();
}

function drawBullet(b) {

    for (let sx of [-size * 0.38, size * 0.38]) {
      ctx.beginPath();
      ctx.moveTo(sx, -size * 0.7);
      ctx.lineTo(sx + size * 0.25, size * 0.4);
      ctx.lineTo(sx, size * 0.2);
      ctx.lineTo(sx - size * 0.25, size * 0.4);
      ctx.closePath();
      ctx.fill();
    }
  } else if (type === 'shield') {
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#2299ff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.75);
    ctx.lineTo(size * 0.65, -size * 0.35);
    ctx.lineTo(size * 0.65, size * 0.1);
    ctx.quadraticCurveTo(0, size * 0.85, 0, size * 0.85);
    ctx.quadraticCurveTo(-size * 0.65, size * 0.1, -size * 0.65, size * 0.1);
    ctx.lineTo(-size * 0.65, -size * 0.35);
    ctx.closePath();
    ctx.fill();
  } else if (type === 'fuel') {
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#44ff66';
    ctx.shadowBlur = 6;
    // Barrel body
    ctx.fillRect(-size * 0.38, -size * 0.55, size * 0.76, size * 0.9);
    // Cap
    ctx.fillRect(-size * 0.22, -size * 0.72, size * 0.44, size * 0.2);
    // Green tint stripe
    ctx.fillStyle = '#88ffaa';
    ctx.fillRect(-size * 0.28, -size * 0.2, size * 0.56, size * 0.22);
  } else {
    // Bomba: daire + patlama çizgileri
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(0, size * 0.1, size * 0.45, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    const rays = 6;
    for (let i = 0; i < rays; i++) {
      const a = (i / rays) * Math.PI * 2 - Math.PI / 2;
      const r1 = size * 0.55, r2 = size * 0.82;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r1, size * 0.1 + Math.sin(a) * r1);
      ctx.lineTo(Math.cos(a) * r2, size * 0.1 + Math.sin(a) * r2);
      ctx.stroke();
    }
    // Fitil
    ctx.strokeStyle = '#ff8';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(size * 0.22, -size * 0.32);
    ctx.quadraticCurveTo(size * 0.5, -size * 0.7, size * 0.15, -size * 0.82);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPowerup(p) {
  const color = POWERUP_COLORS[p.type];
  const bob = Math.sin(p.bobTimer * 0.07) * 3;
  ctx.save();
  ctx.translate(p.x, p.y + bob);

  // Glow
  const glow = POWERUP_GLOW[p.type];
  const grd = ctx.createRadialGradient(0, 0, 4, 0, 0, 22);
  grd.addColorStop(0, glow[0]);
  grd.addColorStop(1, glow[1]);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.fill();

  // Ring
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(0, 0, 15, 0, Math.PI * 2);
  ctx.stroke();

  // Icon (scaled to fit circle)
  drawPowerupIcon(p.type, 10);

  ctx.restore();
}

// --- Draw: Explosions ---
function drawExplosions() {
  // shadowBlur per-particle yerine toplu: önce büyük glow circle'lar, sonra core circle'lar
  ctx.save();
  explosions.forEach(p => {
    ctx.globalAlpha = p.life * 0.35;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 2.2, 0, Math.PI * 2); ctx.fill();
  });
  explosions.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Draw: HUD ---
function drawHUD() {
  ctx.save();

  // Üst çubuk arka planı
  ctx.fillStyle = 'rgba(0,0,20,0.55)';
  ctx.fillRect(0, 0, W, 36);

  ctx.font = 'bold 19px Courier New';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 8;

  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 12, 24);

  ctx.textAlign = 'center';
  ctx.fillText('WAVE: ' + getWave(), W / 2, 24);

  ctx.textAlign = 'right';
  const livesStr = '❤'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
  ctx.fillText('LIVES: ' + livesStr, W - 12, 24);

  // Boss HP barı
  if (boss) {
    const bx = 16, by = 52, bw = W - 32, bh = 18;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx, by, bw, bh);
    const bRatio = boss.hp / boss.maxHp;
    const bPhase = boss.phase || 1;
    const barColors = [['#aa00ff','#ff44ff','#cc44ff'], ['#cc0066','#ff44aa','#ff22aa'], ['#cc2200','#ff6600','#ff4400']];
    const [bc0, bc1, bshadow] = barColors[bPhase - 1];
    const bGrd = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    bGrd.addColorStop(0, bc0);
    bGrd.addColorStop(1, bc1);
    ctx.fillStyle = bGrd;
    ctx.shadowColor = bshadow;
    ctx.shadowBlur = 10;
    ctx.fillRect(bx, by, bw * bRatio, bh);
    ctx.shadowBlur = 0;
    // Faz sınır çizgileri
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
    [0.6, 0.3].forEach(pct => {
      const lx = bx + bw * pct;
      ctx.beginPath(); ctx.moveTo(lx, by); ctx.lineTo(lx, by + bh); ctx.stroke();
    });
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const phaseLabels = ['', ' ◆ PHASE 2', ' ◆◆ PHASE 3'];
    ctx.fillText(`★ BOSS  ${boss.hp} / ${boss.maxHp}${phaseLabels[bPhase-1]}  ★`, W / 2, by + bh / 2);
  }

  // Aktif power-up göstergesi
  const active = [];
  if (player.shieldTimer > 0) active.push({ type: 'shield', timer: player.shieldTimer, color: '#29f', label: 'SHIELD' });
  if (player.tripleTimer > 0) active.push({ type: 'triple', timer: player.tripleTimer, color: '#0fa', label: 'TRIPLE SHOT' });
  if (player.doubleTimer > 0) active.push({ type: 'double', timer: player.doubleTimer, color: '#ff0', label: 'DOUBLE SHOT' });

  if (active.length > 0) {
    const barW = 90, barH = 10, pad = 8;
    const totalW = active.length * (barW + pad * 2 + 26) - pad;
    let sx = W / 2 - totalW / 2;

    active.forEach(a => {
      // Icon
      ctx.save();
      ctx.translate(sx + 13, H - 22);
      drawPowerupIcon(a.type, 8);
      ctx.restore();

      // Bar bg
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(sx + 26, H - 28, barW, barH);

      // Bar fill
      const ratio = a.timer / POWERUP_DURATION;
      ctx.fillStyle = a.color;
      ctx.shadowColor = a.color;
      ctx.shadowBlur = 6;
      ctx.fillRect(sx + 26, H - 28, barW * ratio, barH);

      // Label
      ctx.fillStyle = a.color;
      ctx.font = '9px Courier New';
      ctx.textAlign = 'left';
      ctx.shadowBlur = 4;
      ctx.fillText(a.label, sx + 26, H - 32);

      sx += barW + pad * 2 + 26;
    });
  }

  // Geri butonu (sol üst, HUD'ın hemen altı)
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(6, 44, 52, 26);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(6, 44, 52, 26);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('◀ BACK', 32, 57);

  // Zone 2 extras: fuel bar
  if (currentZone === 2) {
    const fby = boss ? 76 : 44, fbx = 16, fbw = W - 32, fbh = 13;
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(fbx, fby, fbw, fbh);
    const fr = fuel / FUEL_MAX;
    const fc = fr > 0.5 ? '#44ff66' : fr > 0.25 ? '#ffcc00' : '#ff4444';
    ctx.fillStyle = fc; ctx.shadowColor = fc; ctx.shadowBlur = fr < 0.25 ? 10 : 4;
    ctx.fillRect(fbx, fby, fbw * fr, fbh);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`⛽ FUEL  ${Math.ceil(fuel)}%`, W / 2, fby + fbh / 2);

    // Magnetic indicator (level 9)
    if (currentLevel === 9) {
      const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.08);
      ctx.globalAlpha = pulse;
      ctx.font = 'bold 10px Courier New';
      ctx.fillStyle = '#aa44ff'; ctx.shadowColor = '#aa44ff'; ctx.shadowBlur = 8;
      ctx.textAlign = 'right';
      ctx.fillText(`⚡ MAGNET ${magnetDir > 0 ? '▶' : '◀'}`, W - 10, fby + fbh + 12);
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    // Ice slow indicator
    if (iceSlowTimer > 0) {
      const pulse2 = 0.6 + 0.4 * Math.sin(frameCount * 0.1);
      ctx.globalAlpha = pulse2;
      ctx.font = 'bold 10px Courier New';
      ctx.fillStyle = '#88ccff'; ctx.shadowColor = '#88ccff'; ctx.shadowBlur = 8;
      ctx.textAlign = 'left';
      ctx.fillText(`❄ FROZEN ${Math.ceil(iceSlowTimer/60)}s`, 10, fby + fbh + 12);
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
  }

  ctx.restore();
}

// --- Draw: Overlay ---
function drawOverlay(title, sub) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,20,0.78)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 36px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 20;
  ctx.fillText(title, W / 2, H / 2 - 50);

  ctx.fillStyle = '#fff';
  ctx.font = '15px Courier New';
  ctx.shadowBlur = 6;
  ctx.fillText(sub, W / 2, H / 2 + 0);

  if (state === 'start') {
    ctx.fillStyle = '#adf';
    ctx.font = '12px Courier New';
    ctx.shadowBlur = 4;
    const tips = [
      '🛡 Blue shield = 5s invincibility',
      '⚡ Yellow icon = 5s double shot',
      '💣 Red bomb = destroys all enemies',
    ];
    tips.forEach((t, i) => ctx.fillText(t, W / 2, H / 2 + 32 + i * 20));
  }

  if (state === 'gameover') {
    ctx.fillStyle = '#0ff';
    ctx.font = '14px Courier New';
    ctx.fillText('SCORE: ' + score, W / 2, H / 2 + 36);

  // Haritaya dön butonu
